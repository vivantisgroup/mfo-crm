<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- CSP for the Electron shell page only — NOT applied to webview content -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
  <title>MFO Nexus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --toolbar-h: 38px;
      --bg: #0f1117;
      --border: #1e2333;
      --brand: #6366f1;
      --text: #e2e8f0;
      --text-dim: #64748b;
    }

    html, body {
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, 'Inter', BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }

    /* ── Toolbar ─────────────────────────────────────────────────────── */
    #toolbar {
      height: var(--toolbar-h);
      background: #080b12;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      -webkit-app-region: drag;
      user-select: none;
    }

    #toolbar .logo {
      font-size: 14px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -0.03em;
      -webkit-app-region: no-drag;
    }

    #toolbar .spacer { flex: 1; }

    #toolbar button {
      -webkit-app-region: no-drag;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 11px;
      padding: 4px 10px;
      transition: all 0.15s;
    }
    #toolbar button:hover {
      border-color: var(--brand);
      color: var(--text);
    }

    /* ── CRM Panel ───────────────────────────────────────────────────── */
    #crm-panel {
      position: relative;
      width: 100%;
      height: calc(100vh - var(--toolbar-h));
    }

    #crm-webview {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Loading overlay ─────────────────────────────────────────────── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      font-size: 13px;
      color: var(--text-dim);
      pointer-events: none;
      transition: opacity 0.5s;
      z-index: 10;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <div class="logo">⬡ MFO Nexus</div>
  <div class="spacer"></div>
  <button id="btn-reload-crm" title="Reload (Ctrl+R)">↺ Reload</button>
</div>

<!-- ── CRM Panel ──────────────────────────────────────────────────────────── -->
<div id="crm-panel">
  <div class="loading-overlay" id="crm-loading">
    <div class="spinner"></div>
    <span>Loading MFO Nexus…</span>
  </div>
  <webview
    id="crm-webview"
    src="https://mfo-crm-web.vercel.app"
    allowpopups
  ></webview>
</div>

<script>
  const crmWebview = document.getElementById('crm-webview');
  const crmLoading = document.getElementById('crm-loading');

  function hideSpinner() {
    if (!crmLoading) return;
    crmLoading.classList.add('hidden');
    setTimeout(() => crmLoading && crmLoading.remove(), 600);
  }

  function showError(msg) {
    if (!crmLoading) return;
    crmLoading.innerHTML = `
      <div style="text-align:center;padding:40px 24px;max-width:420px">
        <div style="font-size:32px;margin-bottom:16px">⚠️</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:8px;color:#f87171">Could not load MFO Nexus</div>
        <div style="font-size:13px;color:#94a3b8;margin-bottom:24px;line-height:1.6">${msg}</div>
        <button onclick="location.reload()" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer">↺ Retry</button>
      </div>`;
  }

  // Hide spinner once the page finishes loading
  crmWebview.addEventListener('did-finish-load', hideSpinner);

  // Hide spinner (with error UI) if the page fails to load
  crmWebview.addEventListener('did-fail-load', (e) => {
    // Error code -3 is just an aborted navigation (e.g. redirect) — ignore it
    if (e.errorCode === -3) return;
    showError(`Network error ${e.errorCode}: ${e.errorDescription}<br><br>Make sure you are connected to the internet.`);
  });

  // Safety net: if neither event fires within 20s, hide the spinner anyway
  const safetyTimer = setTimeout(hideSpinner, 20000);
  crmWebview.addEventListener('did-finish-load', () => clearTimeout(safetyTimer));
  crmWebview.addEventListener('did-fail-load',   () => clearTimeout(safetyTimer));

  // Reload button
  document.getElementById('btn-reload-crm').addEventListener('click', () => {
    crmLoading.innerHTML = `<div class="spinner"></div><span>Loading MFO Nexus…</span>`;
    crmLoading.classList.remove('hidden');
    crmWebview.reload();
  });

  // Keyboard shortcut: Ctrl+R → reload CRM
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
      e.preventDefault();
      document.getElementById('btn-reload-crm').click();
    }
  });
</script>

</body>
</html>
